server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    charset utf-8;

    # Match upload_max_filesize in perfex.ini
    client_max_body_size 64M;

    # Serve static assets directly; fall back to CodeIgniter front controller
    location / {
        try_files $uri $uri/ /index.php?/$request_uri;
    }

    # Pass every PHP file to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass perfex-app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout      300;
    }

    # Deny direct HTTP access to CodeIgniter internals
    location ~ ^/(application|system)/ {
        deny all;
    }

    # Deny hidden files (.htaccess, .git, etc.)
    location ~ /\. {
        deny all;
    }

    # Suppress favicon noise in logs
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log    off;
    }
}
