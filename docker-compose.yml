version: "3.8"

services:

  # ── Database ──────────────────────────────────────────────────────────────
  perfex-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - perfex-db-data:/var/lib/mysql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PHP-FPM application ───────────────────────────────────────────────────
  # The named volume perfex-app-data is seeded from this image on first start.
  # The web installer writes application/config/app-config.php into that
  # volume so it survives container restarts.
  perfex-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      perfex-db:
        condition: service_healthy
    volumes:
      - perfex-app-data:/var/www/html
    networks:
      - dokploy-network

  # ── Nginx web server ──────────────────────────────────────────────────────
  perfex-nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - perfex-app
    ports:
      - "80:80"
    volumes:
      - perfex-app-data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dokploy-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  perfex-db-data:
    driver: local
  # Entire app tree lives here. Docker seeds it from the image on first run,
  # then the installer and user uploads accumulate inside it.
  perfex-app-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  dokploy-network:
    external: true
