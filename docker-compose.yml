services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      crm_database:
        condition: service_healthy
    volumes:
      # Persist the config directory so app-config.php (created by /install wizard) survives restarts.
      # On first run Docker copies image contents into the empty named volume automatically.
      - app_config:/var/www/html/application/config
      - app_uploads:/var/www/html/uploads
      - app_temp:/var/www/html/temp
      - app_logs:/var/www/html/application/logs
      - app_cache:/var/www/html/application/cache
    networks:
      - perfex_network

  crm_database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - crm_database_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - perfex_network

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      crm_database:
        condition: service_healthy
    environment:
      PMA_HOST: crm_database
      PMA_PORT: 3306
    ports:
      - "8090:80"
    networks:
      - perfex_network

volumes:
  app_config:
  app_uploads:
  app_temp:
  app_logs:
  app_cache:
  crm_database_data:

networks:
  perfex_network:
    driver: bridge
