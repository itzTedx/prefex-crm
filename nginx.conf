server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html index.htm;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log error;

    # Security headers (SSL headers are added by Traefik/Dokploy at the edge)
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?/$request_uri;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # Static assets — served directly, cached aggressively
        location ~* ^.+\.(jpeg|jpg|png|gif|bmp|ico|svg|css|js)$ {
            expires max;
        }

        # PHP — forwarded to the perfex-app PHP-FPM container
        location ~ [^/]\.php(/|$) {
            add_header X-Frame-Options SAMEORIGIN;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";

            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            if (!-f $document_root$fastcgi_script_name) {
                return 404;
            }

            fastcgi_read_timeout 300;
            fastcgi_pass perfex-app:9000;
            fastcgi_index index.php;
            include /etc/nginx/fastcgi_params;
        }
    }

    # Block direct access to backups
    location /backups {
        deny all;
        return 404;
    }

    # Block access to hidden/sensitive files
    location ~* "/\.(htaccess|htpasswd|git|svn)$" {
        deny all;
        return 404;
    }

    # Block direct access to application internals
    location ~* ^/(application|system|vendor)/ {
        deny all;
        return 404;
    }
}
